name: CI latihan2

on:
  push:
    branches: [main]
    paths:
      - "latihan2/**"
      - ".github/workflows/ci-latihan2.yml"
  pull_request:
    paths:
      - "latihan2/**"
      - ".github/workflows/ci-latihan2.yml"

defaults:
  run:
    working-directory: latihan2

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: latihan2/src/serve/requirements-serve.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r src/serve/requirements-serve.txt
      - name: Ruff
        run: ruff check src tests || true
      - name: Pytest (lightweight)
        run: pytest tests/test_evaluator.py -q
        env:
          PYTHONPATH: ${{ github.workspace }}/latihan2
