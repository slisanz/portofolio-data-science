name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r src/serve/requirements-serve.txt
      - name: Ruff
        run: ruff check src tests || true
      - name: Pytest (lightweight)
        run: pytest tests/test_evaluator.py -q
        env:
          PYTHONPATH: ${{ github.workspace }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f src/serve/Dockerfile -t movielens-recsys-api:ci .
